<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #f5f5f5;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="menu-canvas"></canvas>
  <script>
    const canvas = document.getElementById('menu-canvas');
    const ctx = canvas.getContext('2d');

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = 'https://i.imgur.com/gyvzFPy.png';

    img.onload = () => {
      const lowResWidth = 100;
      const lowResHeight = 150;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = lowResWidth;
      tempCanvas.height = lowResHeight;
      const tempCtx = tempCanvas.getContext('2d');

      tempCtx.drawImage(img, 0, 0, lowResWidth, lowResHeight);

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
    };

    window.addEventListener('resize', () => {
      if (img.complete) {
        const lowResWidth = 100;
        const lowResHeight = 150;
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = lowResWidth;
        tempCanvas.height = lowResHeight;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(img, 0, 0, lowResWidth, lowResHeight);

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);
      }
    });
  </script>
</body>
</html>
